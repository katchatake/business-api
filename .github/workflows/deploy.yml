name: Deploy to VPS

on:
  push:
    branches:
      - main # Se activa cuando haces push a la rama 'main'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/projects/business/business-api
            git pull origin main
            # Reconstruir solo si hubo cambios en el Dockerfile o dependencias
            docker compose up -d --build business-api
            # Limpiar imágenes huérfanas para no llenar el disco de IONOS
            docker image prune -f
