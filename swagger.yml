openapi: 3.0.0
info:
  title: SaaS POS API
  description: API para el sistema Punto de Venta Multi-Tenant Polimórfico.
  version: 1.0.0

servers:
  - url: /api/v1
    description: Servidor Principal

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # AUTH
    LoginPayload:
      type: object
      properties:
        username:
          type: string
          example: "admin_glamour"
        password:
          type: string
          example: "una_contraseña_fuerte_123"

    # BUSINESSES
    RegisterBusinessPayload:
      type: object
      properties:
        businessName:
          type: string
          example: "Estética Glamour"
        businessTypeId:
          type: integer
          example: 5
        branchName:
          type: string
          example: "Sucursal Centro"
        owner:
          type: object
          properties:
            username:
              type: string
              example: "admin_glamour"
            email:
              type: string
              example: "admin@glamour.com"
            password:
              type: string
              example: "una_contraseña_fuerte_123"
        fiscal:
          type: object
          properties:
            rfc:
              type: string
              example: "GLA990520XYZ"
            legalName:
              type: string
              example: "Glamour Total SA de CV"

    # BUSINESS TYPES
    CreateBusinessTypePayload:
      type: object
      properties:
        name:
          type: string
          example: "Taller Mecánico"
        categoryId:
          type: integer
          example: 3
        configTemplate:
          type: object
          example:
            modules:
              appointments: { enabled: true }
              inventory: { enabled: true, mode: "SERVICE_WITH_STOCK" }

    # PRODUCTS
    CreateProductPayload:
      type: object
      properties:
        name:
          type: string
          example: "Aceite Sintético 5L"
        product_type:
          type: string
          enum: [SIMPLE, SERVICE, VARIANT_PARENT]
          example: "SIMPLE"
        price:
          type: number
          format: float
          example: 950.00
        cost:
          type: number
          format: float
          example: 600.00
        sku:
          type: string
          example: "ACE-SINT-5L"

    # APPOINTMENTS
    CreateAppointmentPayload:
      type: object
      properties:
        customerId:
          type: integer
          example: 15
        branchId:
          type: integer
          example: 2
        userId:
          type: integer
          example: 5
        productId:
          type: integer
          example: 10
        startTime:
          type: string
          format: date-time
          example: "2025-12-20T14:00:00.000Z"
        durationMinutes:
          type: integer
          example: 60
        notes:
          type: string
          example: "Revisar frenos traseros."

    # PROMOTIONS
    CreatePromotionPayload:
      type: object
      properties:
        name:
          type: string
          example: "20% en Bebidas"
        type:
          type: string
          enum: [PERCENTAGE_ITEM, FIXED_ITEM, BOGO]
          example: "PERCENTAGE_ITEM"
        value:
          type: number
          example: 20
        start_date:
          type: string
          format: date-time
          description: "Fecha de inicio de la promoción. Si se omite, la promoción no tiene fecha de inicio."
        end_date:
          type: string
          format: date-time
          description: "Fecha de fin de la promoción. Si se omite, la promoción no expira."
        productIds:
          type: array
          items:
            type: integer
          example: [10, 12, 15]

    # ORDERS
    CreateOrderPayload:
      type: object
      properties:
        branchId:
          type: integer
          example: 1
        customerId:
          type: integer
          example: 3
        orderType:
          type: string
          enum: [INSTORE, TAKEAWAY, DINE_IN]
          example: "INSTORE"
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: integer
              quantity:
                type: number
            example:
              productId: 10
              quantity: 2

paths:
  /auth/login:
    post:
      summary: Iniciar Sesión
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginPayload"
      responses:
        "200":
          description: Login exitoso, retorna tokens.
        "401":
          description: Credenciales inválidas.

  /businesses:
    post:
      summary: Registrar un nuevo negocio
      tags: [Businesses]
      description: Endpoint público para crear un negocio, su sucursal y su usuario OWNER.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBusinessPayload"
      responses:
        "201":
          description: Negocio registrado exitosamente.
        "400":
          description: Datos inválidos.

  /business-types:
    post:
      summary: Crear un nuevo tipo de negocio
      tags: [Admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBusinessTypePayload"
      responses:
        "201":
          description: Tipo de negocio creado.
        "403":
          description: Rol no autorizado.

  /products:
    get:
      summary: Listar productos del negocio
      tags: [Products]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: branchId
          schema:
            type: integer
          description: ID de la sucursal para validar acceso.
      responses:
        "200":
          description: Lista de productos.
    post:
      summary: Crear un nuevo producto o servicio
      tags: [Products]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductPayload"
      responses:
        "201":
          description: Producto creado.
        "403":
          description: Permisos insuficientes (rol o categoría de negocio).

  /appointments:
    get:
      summary: Listar citas
      tags: [Appointments]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: branchId
          schema:
            type: integer
        - in: query
          name: userId
          schema:
            type: integer
        - in: query
          name: startDate
          schema:
            type: string
            format: date-time
        - in: query
          name: endDate
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Lista de citas.
    post:
      summary: Crear una nueva cita
      tags: [Appointments]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentPayload"
      responses:
        "201":
          description: Cita creada.
        "409":
          description: Conflicto de horario.

  /promotions:
    get:
      summary: Listar promociones
      tags: [Promotions]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de promociones del negocio.
    post:
      summary: Crear una nueva promoción
      tags: [Promotions]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePromotionPayload"
      responses:
        "201":
          description: Promoción creada.
        "400":
          description: Datos inválidos (ej. un producto no existe).

  /orders:
    post:
      summary: Crear una nueva orden
      tags: [Orders]
      security:
        - bearerAuth: []
      description: |
        Crea una orden, aplica promociones y calcula impuestos.
        El sistema automáticamente busca promociones activas (que no hayan expirado y estén dentro de su rango de fechas) para los productos de la orden y aplica los descuentos correspondientes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderPayload"
      responses:
        "201":
          description: Orden creada exitosamente.
        "400":
          description: Datos inválidos (ej. un producto no existe).
